# Hướng dẫn cấu hình Laragon để dùng public/ làm document root
#
# Mục đích: Tách source code PHP ra khỏi web root — tăng bảo mật
# Khi cấu hình đúng: truy cập config.php, core/, app/ qua URL sẽ bị 404
#
# BƯỚC 1: Paste nội dung dưới vào file:
#   C:\laragon\etc\apache2\sites-enabled\auto.Ban_linh_kien.conf
#
# BƯỚC 2: Restart Apache trong Laragon
#
# BƯỚC 3: Thêm vào C:\Windows\System32\drivers\etc\hosts:
#   127.0.0.1   ban-linh-kien.local
#
# BƯỚC 4: Truy cập http://ban-linh-kien.local/
#
# ⚠️ LƯU Ý: Cần restructure project (dời PHP files vào public/) trước
# khi áp dụng cấu hình này. Xem README.md > Deploy > Bước 1.

<VirtualHost *:80>
    ServerName ban-linh-kien.local
    ServerAlias www.ban-linh-kien.local

    # Document root trỏ vào public/ — source code nằm ngoài web root
    DocumentRoot "C:/laragon/www/Ban_linh_kien/public"

    <Directory "C:/laragon/www/Ban_linh_kien/public">
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Log
    ErrorLog  "C:/laragon/log/ban-linh-kien-error.log"
    CustomLog "C:/laragon/log/ban-linh-kien-access.log" combined
</VirtualHost>

